  <body>
    <script>
      (function () {
        try {
          var host = location.hostname.replace(/^www\./, "");
          if (host === "pishalking.biz") {
            location.replace(
              "https://pishalking.ru" + location.pathname + location.search + location.hash
            );
            return;
          }
          var params = new URLSearchParams(location.search);
          var desired = params.get("return_origin");
          if (!desired || desired === location.origin) {
            var raw = localStorage.getItem("mm_auth_origin");
            if (raw) {
              var data = JSON.parse(raw);
              desired = data.origin;
            }
          }
          if (!desired || desired === location.origin) return;
          if (desired.indexOf("pishalking.ru") === -1 && desired.indexOf("localhost") === -1) return;
          var next = params.get("next") || localStorage.getItem("mm_auth_next");
          params.delete("return_origin");
          var path = location.pathname;
          var qs = params.toString();
          if (qs) path += "?" + qs;
          path += location.hash;
          if (next && (location.pathname === "/" || location.pathname === "/auth")) {
            path = next + location.hash;
          }
          location.replace(desired + path);
        } catch (e) {}
      })();
    </script>
    <script>
      (function () {
        try {
          var host = location.hostname.replace(/^www\./, "");
          var path = location.pathname;
          var ideaLabHost =
            host === "ideas.pishalking.ru" || host === "ideas.localhost";
          var ideaLabPath =
            path === "/idea-lab" || path.indexOf("/idea-lab/") === 0;
          var icon = document.querySelector('link[rel="icon"]');
          if (icon) {
            icon.href = ideaLabHost ? "/ideas-favicon.svg" : "/favicon.svg";
            icon.type = "image/svg+xml";
          }
          if (!ideaLabHost && !ideaLabPath) return;
          document.title = "Idea Lab";
        } catch (e) {}
      })();
    </script>
