name: Deploy pishalking.ru (Timeweb)

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-timeweb
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci

      - run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          VITE_SUPABASE_PROJECT_ID: ${{ secrets.VITE_SUPABASE_PROJECT_ID }}
          # Включить после DNS: ideas.pishalking.ru → тот же хостинг, что pishalking.ru
          # VITE_IDEA_LAB_USE_SUBDOMAIN: "true"

      - uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.TIMEWEB_FTP_HOST }}
          username: ${{ secrets.TIMEWEB_FTP_USER }}
          password: ${{ secrets.TIMEWEB_FTP_PASSWORD }}
          local-dir: dist/
          server-dir: ${{ secrets.TIMEWEB_FTP_SERVER_DIR }}
          dangerous-clean-slate: false
          log-level: minimal
